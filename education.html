<body>

<header class="site-header">
    <div class="container header-inner">
        <div class="brand">
            <a class="brand-link" href="index.html" aria-label="Home">
                <span class="brand-mark" aria-hidden="true">WW</span>
                <span class="brand-text">
            <span class="brand-name">Weston Wilner</span>
            <span class="brand-tag">WANGHAF</span>
          </span>
            </a>
        </div>

        <nav class="nav" aria-label="Primary">
            <a class="nav-link" href="index.html">About</a>
            <a class="nav-link" href="projects.html">Projects</a>

            <a class="nav-link" href="code.html">Code</a>

        </nav>
        <div class="theme-toggle-wrap">
            <span class="theme-label">Light</span>

            <label class="theme-switch" aria-label="Toggle dark and light theme">
                <input type="checkbox" id="theme-toggle">
                <span class="theme-slider"></span>
            </label>

            <span class="theme-label">Dark</span>
        </div>
    </div>
</header>

<main id="main" class="container">
    <section class="page-head">
        <h1>Montana State University</h1>
        <p class="muted">Relevent courses and projects</p>
    </section>

    <section class="stack">
        <article class="card">
            <div class="project-grid">
                <div class="project-main">
                    <div class="card-top">
                        <h2 class="card-title">Courses</h2>
                    </div>

                    <ul class="bullets">
                        <li>course</li>
                        <li>course</li>
                        <li>course</li>
                    </ul>
                </div>
            </div>
        </article>

        <article class="card">
            <div class="project-grid">
                <div class="project-main">
                    <div class="card-top">
                        <h2 class="card-title">Projects</h2>
                    </div>
                    <ul class="bullets">
                        <li>Project</li>
                        <li>Project</li>
                        <li>Project</li>
                    </ul>
                </div>
            </div>
        </article>
    </section>

</main>

<footer class="site-footer">
    <div class="container footer-inner">
        <p class="muted">© <span id="year"></span> Weston Wilner</p>
        <p class="muted"><a href="index.html">Home</a></p>
    </div>
</footer>

<script>
    const year = document.getElementById("year");
    const themeToggle = document.getElementById("theme-toggle");

    if (year) {
        year.textContent = new Date().getFullYear();
    }

    function applyTheme(theme) {
        if (theme === "light") {
            document.body.classList.add("light-theme");
            themeToggle.checked = false;
        } else {
            document.body.classList.remove("light-theme");
            themeToggle.checked = true;
        }

        localStorage.setItem("theme", theme);
    }

    const savedTheme = localStorage.getItem("theme");

    if (savedTheme) {
        applyTheme(savedTheme);
    } else {
        applyTheme("dark");
    }

    themeToggle.addEventListener("change", function () {
        if (themeToggle.checked) {
            applyTheme("dark");
        } else {
            applyTheme("light");
        }
    });
</script>
</body>
</html>
